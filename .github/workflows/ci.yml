name: Lint Codebase

on:
  pull_request_target:
    branches:
      - main
    paths-ignore:
      - text.txt

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  symlinks:
    name: Consolidate Inventory Symlinks
    runs-on: ubuntu-latest
    # env:
    #   GH_TOKEN: ${{ secrets.PAT }}

    permissions:
      contents: read
      packages: read
      statuses: write
      pull-requests: write

    steps:
      - name: Generate GitHub token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: wechorg
      - run: echo "${{ github.event.pull_request.head.repo.owner.login }}"
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          token: ${{ steps.token.outputs.token }}
          persist-credentials: true

      - name: Validate maintainer edit permissions
        if: false
        env:
          # GH_TOKEN: ${{ secrets.PAT }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail

          UPSTREAM_REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          TOKEN_LOGIN="$(gh api user --jq '.login')"
          echo "Token user: ${TOKEN_LOGIN}"

          CAN_MODIFY="$(gh api repos/${UPSTREAM_REPO}/pulls/${PR_NUMBER} --jq '.maintainer_can_modify')"
          echo "maintainer_can_modify: ${CAN_MODIFY}"

          if [ "${CAN_MODIFY}" != "true" ]; then
            echo "::warning::PR does not allow edits from maintainers (maintainer_can_modify=false)."
          fi

          PERM="$(gh api repos/${UPSTREAM_REPO}/collaborators/${TOKEN_LOGIN}/permission --jq '.permission')"
          echo "upstream permission for ${TOKEN_LOGIN}: ${PERM}"

          case "${PERM}" in
            admin|maintain|write)
              echo "OK: token user is a maintainer-level collaborator on upstream."
              ;;
            *)
              echo "::warning::Token user lacks maintainer-level access on upstream (needs write/maintain/admin, got: ${PERM})."
              ;;
          esac

          echo "TOKEN_LOGIN=${TOKEN_LOGIN}" >> "$GITHUB_ENV"

      - name: Checkout PR branch
        if: false
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          git fetch "https://${TOKEN_LOGIN}:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            "refs/pull/${{ github.event.pull_request.number }}/head:${{ github.event.pull_request.head.ref }}"
          git checkout "${{ github.event.pull_request.head.ref }}"

      - name: Diagnose PAT access to fork
        if: false
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          echo "PAT scopes:"
          curl -sS -I -H "Authorization: Bearer ${GH_TOKEN}" https://api.github.com/user | grep -i '^x-oauth-scopes:' || true
          echo "Can PAT see the fork?"
          gh api "repos/${{ github.event.pull_request.head.repo.full_name }}" --jq '.full_name,.private,.permissions' || echo "PAT cannot read the fork"

      - run: git log --oneline

      - run: echo "${{ github.run_id }}" >> text.txt

      - name: Commit changes back to PR
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail

          curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/user

          git config --global user.name "ama-pfs-america-ansible-automation[bot]"
          git config --global user.email "265116361+ama-pfs-america-ansible-automation[bot]@users.noreply.github.com"

          git add --all .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Automated symlink consolidation [skip ci]"

          # Push directly with PAT in URL. Do NOT use `gh auth setup-git` in this
          # job — its credential helper interferes with the maintainer-push-to-fork path.
          git push "https://${TOKEN_LOGIN}:${GH_TOKEN}@github.com/${{ github.event.pull_request.head.repo.full_name }}.git" "HEAD:${{ github.event.pull_request.head.ref }}"
